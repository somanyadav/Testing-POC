<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <!-- SheetJS: reads the .xlsx in the browser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-top: #EEF1F6;
      --bg-bottom: #E2E7EF;
      --surface: #FFFFFF;
      --ink: #141C2B;
      --muted: #5B6B82;
      --accent: #2B50E8;
      --accent-press: #1F3DC4;
      --line: #D5DCE6;
      --field: #F6F8FB;
      --error: #C9352F;
      --error-bg: #FBEAE9;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: var(--ink);
      background: linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-top: 3px solid var(--accent);
      border-radius: 14px; padding: 36px 32px;
      box-shadow: 0 18px 40px -22px rgba(20, 28, 43, 0.45);
      transition: max-width 0.3s ease;
    }
    .card.wide { max-width: 760px; }
    .view { display: none; }
    .view.active { display: block; animation: rise 0.4s ease both; }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    h1 {
      font-family: "Space Grotesk", sans-serif; font-weight: 700;
      font-size: 1.75rem; letter-spacing: -0.01em; margin: 0 0 6px;
    }
    .subtitle { margin: 0 0 26px; color: var(--muted); font-size: 0.9rem; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 7px; }
    input {
      width: 100%; font: inherit; font-size: 0.95rem; color: var(--ink);
      background: var(--field); border: 1px solid var(--line);
      border-radius: 9px; padding: 11px 13px;
      transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
    }
    input:focus {
      outline: none; background: var(--surface); border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(43, 80, 232, 0.16);
    }
    button {
      font-family: "Space Grotesk", sans-serif; font-weight: 500; font-size: 0.95rem;
      color: #fff; background: var(--accent); border: none; border-radius: 9px;
      padding: 11px 16px; cursor: pointer; transition: background 0.15s, transform 0.05s;
    }
    button.full { width: 100%; }
    button:hover { background: var(--accent-press); }
    button:active { transform: translateY(1px); }
    button:focus-visible { outline: none; box-shadow: 0 0 0 3px rgba(43, 80, 232, 0.35); }
    .ghost { background: transparent; color: var(--accent); border: 1px solid var(--line); padding: 8px 14px; font-size: 0.85rem; }
    .ghost:hover { background: var(--field); }
    .error {
      display: none; align-items: center; gap: 8px;
      background: var(--error-bg); color: var(--error); font-size: 0.85rem;
      border-radius: 8px; padding: 10px 12px; margin-bottom: 18px;
    }
    .error.show { display: flex; }
    .data-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 4px; }
    .data-head h2 { font-family: "Space Grotesk", sans-serif; font-weight: 700; font-size: 1.4rem; margin: 0; }
    .data-sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 22px; }
    .data-sub strong { color: var(--ink); }
    .status { color: var(--muted); font-size: 0.9rem; padding: 18px 2px; }
    .status.err { color: var(--error); }
    .table-wrap { overflow-x: auto; border: 1px solid var(--line); border-radius: 10px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    thead th {
      text-align: left; font-family: "Space Grotesk", sans-serif; font-weight: 500;
      font-size: 0.78rem; letter-spacing: 0.02em; text-transform: uppercase;
      color: var(--muted); background: var(--field); padding: 11px 14px;
      border-bottom: 1px solid var(--line); white-space: nowrap;
    }
    tbody td { padding: 11px 14px; border-bottom: 1px solid var(--line); white-space: nowrap; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #FAFBFD; }
    @media (prefers-reduced-motion: reduce) {
      .view.active { animation: none; }
      input, button, .card { transition: none; }
    }
  </style>
</head>
<body>
  <main class="card" id="card">

    <!-- LOGIN VIEW -->
    <section id="loginView" class="view active" aria-labelledby="loginHeading">
      <h1 id="loginHeading">Sign in</h1>
      <p class="subtitle">Enter your username and password to continue.</p>
      <form id="loginForm" novalidate>
        <div class="error" id="errorBox" role="alert">
          <span aria-hidden="true">&#9888;</span>
          <span>Incorrect username or password.</span>
        </div>
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" autocapitalize="none" spellcheck="false" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
        </div>
        <button type="submit" class="full">Sign in</button>
      </form>
    </section>

    <!-- DATA VIEW -->
    <section id="dataView" class="view" aria-labelledby="dataHeading">
      <div class="data-head">
        <h2 id="dataHeading">Your records</h2>
        <button type="button" class="ghost" id="logoutBtn">Sign out</button>
      </div>
      <p class="data-sub">Signed in as <strong id="whoami">user1</strong></p>
      <div id="dataStatus" class="status">Loading&hellip;</div>
      <div id="tableWrap" class="table-wrap" style="display:none;"></div>
    </section>

  </main>

  <script>
    // Credentials (readable in page source on a static site)
    const USERS = { "user1": "first", "user2": "second", "user3": "third" };
    // Spreadsheet name, in the same folder as this file
    const DATA_FILE = "data.xlsx";

    const card      = document.getElementById("card");
    const loginView = document.getElementById("loginView");
    const dataView  = document.getElementById("dataView");
    const form      = document.getElementById("loginForm");
    const errorBox  = document.getElementById("errorBox");
    const whoami    = document.getElementById("whoami");
    const statusEl  = document.getElementById("dataStatus");
    const tableWrap = document.getElementById("tableWrap");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      if (USERS[username] !== undefined && USERS[username] === password) {
        whoami.textContent = username;
        loginView.classList.remove("active");
        dataView.classList.add("active");
        card.classList.add("wide");
        loadData(username);
      } else {
        errorBox.classList.add("show");
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", function () {
      form.reset();
      errorBox.classList.remove("show");
      dataView.classList.remove("active");
      card.classList.remove("wide");
      tableWrap.style.display = "none";
      tableWrap.innerHTML = "";
      statusEl.style.display = "";
      statusEl.className = "status";
      statusEl.textContent = "Loading\u2026";
      loginView.classList.add("active");
      document.getElementById("username").focus();
    });

    async function loadData(username) {
      statusEl.className = "status";
      statusEl.style.display = "";
      statusEl.textContent = "Loading\u2026";
      tableWrap.style.display = "none";
      tableWrap.innerHTML = "";
      try {
        const resp = await fetch(DATA_FILE, { cache: "no-store" });
        if (!resp.ok) throw new Error("HTTP " + resp.status);
        const buf = await resp.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array", cellDates: true });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
        if (!rows.length) { showStatus("The spreadsheet is empty."); return; }
        const userKey = Object.keys(rows[0]).find(k => k.trim().toLowerCase() === "user");
        if (!userKey) { showStatus('No "user" column found in the spreadsheet.', true); return; }
        const mine = rows.filter(r => String(r[userKey] ?? "").trim().toLowerCase() === username.toLowerCase());
        if (!mine.length) { showStatus("No records found for " + username + "."); return; }
        renderTable(Object.keys(rows[0]), mine);
        statusEl.style.display = "none";
        tableWrap.style.display = "";
      } catch (err) {
        showStatus("Couldn't load " + DATA_FILE + " (" + err.message + "). Make sure it sits next to index.html in the repo.", true);
      }
    }

    function showStatus(msg, isError) {
      statusEl.textContent = msg;
      statusEl.className = "status" + (isError ? " err" : "");
      statusEl.style.display = "";
      tableWrap.style.display = "none";
    }

    function fmt(v) {
      if (v instanceof Date && !isNaN(v)) return v.toLocaleDateString();
      return String(v);
    }

    function renderTable(columns, rows) {
      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const htr = document.createElement("tr");
      columns.forEach(col => { const th = document.createElement("th"); th.textContent = col; htr.appendChild(th); });
      thead.appendChild(htr);
      table.appendChild(thead);
      const tbody = document.createElement("tbody");
      rows.forEach(row => {
        const tr = document.createElement("tr");
        columns.forEach(col => { const td = document.createElement("td"); td.textContent = fmt(row[col]); tr.appendChild(td); });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      tableWrap.innerHTML = "";
      tableWrap.appendChild(table);
    }
  </script>
</body>
</html>
